<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Indo Thai Global</title>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/welcome.css"/>
</head>
<body>
<main class="wp" id="wp">

  <!-- ░░ BACKGROUND LAYERS ░░ -->
  <div class="bg-base"    aria-hidden="true"></div>
  <div class="bg-vignette"aria-hidden="true"></div>

  <!-- Animated mesh grid -->
  <div class="grid-mesh"  aria-hidden="true"></div>

  <!-- Floating light orbs — subtle, slow -->
  <div class="orb orb-a"  aria-hidden="true"></div>
  <div class="orb orb-b"  aria-hidden="true"></div>
  <div class="orb orb-c"  aria-hidden="true"></div>

  <!-- ░░ TOP BAR ░░ -->
  <header class="top-bar" aria-hidden="true">
    <div class="top-bar-line"></div>
    <span class="top-bar-text">EST. 2005 &nbsp;·&nbsp; INDIA &nbsp;·&nbsp; INDO THAI GLOBAL</span>
    <div class="top-bar-line"></div>
  </header>

  <!-- ░░ MAIN STAGE ░░ -->
  <div class="stage">

    <!-- Centre card -->
    <div class="card">

      <!-- Card inner top shimmer line -->
      <div class="card-shimmer" aria-hidden="true"></div>

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-ring" aria-hidden="true"></div>
        <img
          src="assets/logo.png"
          alt="Indo Thai Global"
          class="logo-img"
          draggable="false"
          onerror="this.style.display='none'"
        />
      </div>

      <!-- Eyebrow -->
      <p class="eyebrow">
        <span class="eyebrow-dash"></span>
        Welcome to
        <span class="eyebrow-dash"></span>
      </p>

      <!-- Company name -->
      <h1 class="name">
        <span class="name-line name-line--1">INDO THAI</span>
        <span class="name-line name-line--2">GLOBAL</span>
      </h1>

      <!-- Tagline -->
      <p class="tagline">
        Efficient, Hygienic &amp; Sustainable Drying Systems
      </p>

      <!-- Gradient rule -->
      <div class="rule-wrap" aria-hidden="true">
        <svg viewBox="0 0 440 8" fill="none" preserveAspectRatio="none">
          <path class="rule-path"
            d="M0 4 Q110 1 220 4 Q330 7 440 4"
            stroke="url(#rg)" stroke-width="1.4" stroke-linecap="round"/>
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#5db830" stop-opacity="0"/>
              <stop offset="22%"  stop-color="#7dd040"/>
              <stop offset="50%"  stop-color="#f4a820"/>
              <stop offset="78%"  stop-color="#e05510"/>
              <stop offset="100%" stop-color="#e05510" stop-opacity="0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Enter CTA -->
      <div class="white-divider" aria-hidden="true"></div>
      <div class="enter-cta">
        <div class="enter-btn">
          <span class="enter-btn-text">Enter Site</span>
          <span class="enter-btn-arrow">&#8594;</span>
        </div>
        <p class="enter-sub">or click anywhere to continue</p>
      </div>

    </div><!-- /.card -->
    
  </div><!-- /.stage -->
</main>
<script src="js/welcome.js"></script>
</body>
</html>
